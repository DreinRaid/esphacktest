backend:
  name: github
  repo: Teapot174/ESP-HACK
  branch: main

media_folder: images/uploads
public_folder: /images/uploads

collections:
  - name: site_data
    label: Данные сайта
    files:
      - label: Релизы GitHub (авто-список файлов)
        name: github_release
        file: data/github-release.json
        format: json
        fields:
          - { label: Владелец репозитория, name: owner, widget: string }
          - { label: Имя репозитория, name: repo, widget: string }
          - {
              label: Подтягивать файлы с GitHub API (последний релиз),
              name: useGithubApi,
              widget: boolean,
              default: true,
            }
          - {
              label: Показывать «Список изменений» на главной (описание последнего релиза),
              name: changelogEnabled,
              widget: boolean,
              default: true,
            }
          - { label: Ссылка на страницу Releases, name: releasesPageUrl, widget: string }
          - { label: Заголовок блока на сайте, name: sectionTitle, widget: string, default: Assets }
          - label: Скрыть файлы, в имени которых есть (подстроки)
            name: excludeNameSubstrings
            widget: list
            field: { label: Подстрока, name: substring, widget: string }
            required: false

      - label: Скачиваемые файлы (ручной список, если API выключен)
        name: downloads
        file: data/downloads.json
        format: json
        fields:
          - label: Ссылка на страницу Releases
            name: releasesPageUrl
            widget: string
          - label: Секции (группы файлов)
            name: sections
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { label: Заголовок секции, name: title, widget: string }
              - label: Файлы в секции
                name: items
                widget: list
                summary: "{{fields.name}}"
                fields:
                  - { label: Имя файла, name: name, widget: string }
                  - { label: Прямая ссылка на скачивание, name: url, widget: string }
                  - label: SHA-256 (только если публикуете хеш)
                    name: sha256
                    widget: string
                    required: false
                  - { label: Размер, name: size, widget: string, required: false }
                  - { label: Дата, name: date, widget: string, required: false }

      - label: Меню навигации
        name: navigation
        file: data/nav.json
        format: json
        fields:
          - label: Группы в сайдбаре
            name: groups
            widget: list
            summary: "{{fields.label}}"
            fields:
              - { label: Заголовок группы, name: label, widget: string }
              - label: Пункты меню
                name: items
                widget: list
                types:
                  - label: Обычная ссылка
                    name: link
                    widget: object
                    fields:
                      - { label: Текст, name: label, widget: string }
                      - { label: URL, name: href, widget: string }
                  - label: Группа с подпунктами
                    name: expand
                    widget: object
                    fields:
                      - { label: Уникальный ID (латиницей), name: id, widget: string }
                      - { label: Заголовок, name: label, widget: string }
                      - { label: Ссылка раздела, name: href, widget: string }
                      - label: Автораскрытие подменю на страницах
                        name: openOn
                        widget: list
                        field: { label: Имя файла, name: file, widget: string }
                      - label: Подпункты
                        name: children
                        widget: list
                        fields:
                          - { label: Текст, name: label, widget: string }
                          - { label: URL, name: href, widget: string }
