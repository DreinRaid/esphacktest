<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ESP-HACK — Wiki</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/site-nav.js" defer></script>
    <script src="../js/render-changelog.js" defer></script>
  </head>
  <body>
    <div class="lang-switch lang-switch--en" role="navigation" aria-label="Language">
      <div class="lang-switch__track">
        <span class="lang-switch__thumb" aria-hidden="true"></span>
        <a href="../index.html" class="lang-switch__opt">RU</a>
        <span class="lang-switch__opt lang-switch__opt--current" aria-current="page">EN</span>
      </div>
    </div>
    <div class="shell shell--nav-left">
      <aside class="sidebar" aria-label="Wiki navigation">
        <div class="sidebar__inner">
          <div class="sidebar__brand">ESP-HACK</div>
          <nav aria-label="Wiki sections">
            <div id="site-nav-container"></div>
          </nav>
        </div>
      </aside>

      <main class="content">
        <div class="content__wrap">
          <h1>Welcome to the ESP-HACK wiki</h1>

          <p>
            ESP-HACK is an ESP32 project for pentesting. It includes custom firmware and a dedicated
            device.
          </p>
          <p>
            This wiki collects guides for flashing, modules, and hardware wiring.
          </p>
          <figure class="flash-install-figure">
            <img src="../images/device-main.png" alt="ESP-HACK device" width="1024" height="768" />
          </figure>

          <section
            id="changelog"
            class="changelog"
            aria-labelledby="changelog-heading"
            data-releases-fallback="https://github.com/Teapot174/ESP-HACK/releases"
          >
            <h2 id="changelog-heading">Changelog</h2>
            <p class="changelog__meta" id="changelog-meta"></p>
            <div class="changelog__body" id="changelog-body">
              <p class="changelog__loading">Loading…</p>
            </div>
          </section>
        </div>
      </main>
    </div>
  </body>
</html>
