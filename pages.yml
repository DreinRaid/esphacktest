# Публикует сайт из корня репозитория на GitHub Pages.
# В репозитории: Settings → Pages → Build and deployment → Source: GitHub Actions.

name: Deploy Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Минификация + mangling только в артефакт Pages; в git остаётся читаемый admin/app.js.
      - name: Minify admin script (deploy)
        run: npx --yes terser@5 admin/app.js -c passes=2 -m -o admin/app.min.js && mv admin/app.min.js admin/app.js

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
