# Публикует сайт из корня репозитория на GitHub Pages.
# В репозитории: Settings → Pages → Build and deployment → Source: GitHub Actions.

name: Deploy Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch firmware binaries for web flasher
        env:
          FW_SH: https://github.com/Teapot174/ESP-HACK/releases/latest/download/esp-hack_v0.8-sh.bin
          FW_SSD: https://github.com/Teapot174/ESP-HACK/releases/latest/download/esp-hack_v0.8-ssd.bin
        run: |
          mkdir -p firmware
          curl -fL --retry 3 -o firmware/esp-hack-sh.bin "$FW_SH"
          curl -fL --retry 3 -o firmware/esp-hack-ssd.bin "$FW_SSD"

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
